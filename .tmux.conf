set -g mouse on

# Catppuccin theme
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Catppuccin config
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_background 'default'

# Status bar modules
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %H:%M"

# Make active pane/window very obvious
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour39,bold"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bg=colour39,fg=black,bold] ACTIVE #[default],#[fg=colour245] pane #{pane_index} #[default]} #{pane_current_command}"

# Make current window tab readable but not eye-searing
set -g window-status-style "fg=colour245"
set -g window-status-current-style "fg=colour255,bold"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Re-apply high-contrast overrides after plugins load
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour39,bold"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bg=colour39,fg=black,bold] ACTIVE #[default],#[fg=colour245] pane #{pane_index} #[default]} #{pane_current_command}"
set -g window-status-style "fg=colour245"
set -g window-status-current-style "fg=colour255,bold"

# Agent busy/idle indicator (pi + codex + opencode via tmux pane title)
set -g status 2
set -g status-interval 1
set -g status-justify left
# Row 1 window list with focus-aware scrolling (auto keeps active window visible).
set -g status-format[0] '#[list=on align=left]#[list=left-marker] #[list=right-marker] #[list=on]#{W:#[range=window|#{window_index}]#{T:window-status-format}#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus]#[bold]#{T:window-status-current-format}#{?loop_last_flag,,#{window-status-separator}}}'
# Row 2: user@host on the left, system stats on the right.
set -g status-format[1] '#[align=left]#[fg=colour245]#(id -un)@#H#[default]#[align=right]#[fg=colour245]#($HOME/bin/tmux-sys-stats.sh)#[default]'
# Clear any leftover third-row format from plugin/default templates.
set -gu status-format[2]
set -g @agent_state '#{?#{||:#{==:#{pane_title},pi:busy},#{||:#{==:#{pane_title},codex:busy},#{==:#{pane_title},opencode:busy}}},#[fg=colour220]#($HOME/bin/tmux-busy-spinner.sh)#[default],#{?#{||:#{==:#{pane_title},pi:idle},#{||:#{==:#{pane_title},codex:idle},#{==:#{pane_title},opencode:idle}}},#[fg=colour84]#[default],#{?#{||:#{==:#{pane_title},pi:offline},#{||:#{==:#{pane_title},codex:offline},#{==:#{pane_title},opencode:offline}}},#[fg=colour203]#[default],#[fg=colour245]#[default]}}}'
set -g @agent_label '#{?#{||:#{==:#{pane_title},codex:busy},#{||:#{==:#{pane_title},codex:idle},#{==:#{pane_title},codex:offline}}},codex,#{?#{||:#{==:#{pane_title},pi:busy},#{||:#{==:#{pane_title},pi:idle},#{==:#{pane_title},pi:offline}}},pi,#{?#{||:#{==:#{pane_title},opencode:busy},#{||:#{==:#{pane_title},opencode:idle},#{==:#{pane_title},opencode:offline}}},opencode,#W}}}'
set -g @agent_folder '#{?pane_current_path,#{b:pane_current_path},unknown}'
# Fancy separators between window entries (Powerline-style)
set -g window-status-separator ' #[fg=colour240]#[default] '
set -g window-status-format '#I #{E:@agent_label} #{=/14/…:#{E:@agent_folder}} #{E:@agent_state}'
set -g window-status-current-format '#[bold]#I #{E:@agent_label} #{=/14/…:#{E:@agent_folder}} #{E:@agent_state}'

# On Enter: resync the focused pane's agent state, then mark active agent pane busy.
# Codex notify hook flips codex back to idle on turn completion.
unbind-key -n Enter
bind-key -n Enter run-shell -b "$HOME/bin/tmux-before-enter.sh #{pane_id} #{pane_pid} #{q:pane_title}" \; send-keys Enter

# Keep pane titles in sync with actual agent process state.
set-hook -g after-select-pane 'run-shell -b "$HOME/bin/tmux-agent-resync.sh #{pane_id} #{pane_pid} #{q:pane_title}"'
set-hook -g after-select-window 'run-shell -b "$HOME/bin/tmux-agent-resync.sh #{pane_id} #{pane_pid} #{q:pane_title}"'
set-hook -g after-new-window 'run-shell -b "$HOME/bin/tmux-agent-resync.sh"'
set-hook -g after-split-window 'run-shell -b "$HOME/bin/tmux-agent-resync.sh"'
run-shell -b "$HOME/bin/tmux-agent-resync.sh"
run-shell -b "$HOME/bin/tmux-agent-daemon.sh"

# Agent overview popup (prefix + O): quick snapshot of what every window is doing.
bind-key O display-popup -E -w 92% -h 88% "$HOME/bin/tmux-agent-overview.sh"

# Manual resync (prefix + U) if states ever look stale.
bind-key U run-shell "$HOME/bin/tmux-agent-resync.sh" \; display-message "agent states resynced"

